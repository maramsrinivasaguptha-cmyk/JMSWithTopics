# Web Server configuration
server.port=8080

# ActiveMQ Artemis configuration
spring.artemis.mode=embedded
spring.artemis.embedded.port=61616
spring.artemis.embedded.tcp-enabled=true

# Logging configuration
logging.level.org.apache.activemq.artemis=INFO
logging.level.org.springframework.jms=INFO
logging.level.com.ems.jmsservice=DEBUG

# Enable Jackson pretty printing
spring.jackson.serialization.indent_output=true
